name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # toolchain を記録(issue #10: Swift >= 6.2 / xcode-select 由来パスの検証)
      - name: Toolchain versions
        run: |
          swift --version
          xcode-select -p

      - name: Security check
        run: make check

      - name: Test
        run: make test

      - name: Build
        run: make build
